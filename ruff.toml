# Ruff configuration for Pycatia_Scripts
# https://docs.astral.sh/ruff/

target-version = "py310"
line-length = 140

# Only check for real errors and undefined-name bugs.
# Style and formatting rules are excluded — scripts follow their own conventions.
[lint]
select = [
    "E",    # pycodestyle errors (syntax-level)
    "F",    # pyflakes (undefined names, unused imports, redefined)
]
ignore = [
    "E501",  # line too long — not enforced; scripts have inline comments
    "E701",  # multiple statements on one line — intentional brevity pattern in these scripts
    "E712",  # comparison to True/False — intentional in some cases
    "E721",  # type comparison style — type(x) == Foo used intentionally for exact type checks
    "E722",  # bare except — intentional fallback pattern (except: pass) used throughout
    "E741",  # ambiguous variable name — l/I/O only; l is used as a geometric coordinate in drawing scripts
    "F401",  # imported but unused — some pycatia type imports are for isinstance checks resolved at runtime
    "F841",  # local variable assigned but never used — common in pycatia event handlers
]

# Exclude setup templates and utility files that aren't user scripts
exclude = [
    "setup/",
    ".github/",
]
