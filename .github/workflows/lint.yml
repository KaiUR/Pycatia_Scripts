name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-headers:
    name: Validate script headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate headers
        run: python .github/scripts/validate_headers.py

  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .
